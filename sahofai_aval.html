<html lang="tg">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>📊 Системаи идоракунии молия</h1>

        <nav class="nav-menu">
            <a href="sahofai_aval.html">🏠 Асосӣ</a>
            <a href="sahofai_daromad.html">💰 Даромад</a>
            <a href="sahofai_harojot.html">💸 Хароҷот</a>
            <a href="sahofai_p2p.html">📈 P2P</a>
            <a href="sahofai_hisobot.html">📊 Ҳисобот</a>
            <a href="sahofai_taftish.html">🔎 Таҳлил</a>
        </nav>

        <div class="glass">
            <h2>Ҳолати умумӣ</h2>
            <div class="row">
                <div class="stat-card">
                    <h3>Маблағи умумӣ</h3>
                    <p id="total-balance">0.00</p>
                </div>
                <div class="stat-card">
                    <h3>Даромади имрӯз</h3>
                    <p id="daily-income">0.00</p>
                </div>
                <div class="stat-card">
                    <h3>Хароҷоти имрӯз</h3>
                    <p id="daily-expense">0.00</p>
                </div>
            </div>
        </div>

        <div class="glass">
            <h2>Ҳисоботи моҳона</h2>
            <div class="row">
                <div class="stat-card">
                    <h3>Даромад</h3>
                    <p id="monthly-income">0.00</p>
                </div>
                <div class="stat-card">
                    <h3>Хароҷот</h3>
                    <p id="monthly-expense">0.00</p>
                </div>
                <div class="stat-card">
                    <h3>Фоида P2P</h3>
                    <p id="monthly-p2p">0.00</p>
                </div>
                <div class="stat-card">
                    <h3>Фоидаи холис</h3>
                    <p id="monthly-net">0.00</p>
                </div>
            </div>
        </div>
    </div>

    <script src="skript.js"></script>
