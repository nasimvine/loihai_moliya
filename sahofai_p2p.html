<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ҳисоб P2P</title>
    <link rel="stylesheet" href="dizayn.css">
    <link rel="stylesheet" href="style.css">
    <script src="skript.js"></script>
</head>
<body>
    <div class="container">
        <h1>📈 Амалиёти P2P</h1>

        <nav class="nav-menu">
            <a href="sahofai_aval.html">🏠 Асосӣ</a>
            <a href="sahofai_daromad.html">💰 Даромад</a>
            <a href="sahofai_harojot.html">💸 Хароҷот</a>
            <a href="sahofai_p2p.html">📈 P2P</a>
            <a href="sahofai_hisobot.html">📊 Ҳисобот</a>
            <a href="sahofai_taftish.html">🔎 Таҳлил</a>
        </nav>

        <div class="glass">
            <form id="p2p-form">
                <div class="form-group">
                    <label>Маблағ харид (сомон):</label>
                    <input type="number" step="0.01" min="0.01" id="p2p-amount" required>
                </div>
                <div class="form-group">
                    <label>Қурби харид:</label>
                    <input type="number" step="0.01" min="0.01" id="p2p-buy" required>
                </div>
                <div class="form-group">
                    <label>Қурби фурӯш:</label>
                    <input type="number" step="0.01" min="0.01" id="p2p-sell" required>
                </div>
                <div class="form-group">
                    <label>Сабаб:</label>
                    <input type="text" id="p2p-reason" placeholder="Масалан: Мубодила USDT">
                </div>
                <button type="button" class="btn btn-purple" onclick="submitP2P()">Ҳисоб ва сабт</button>
            </form>
        </div>
    </div>

    <script src="skript.js"></script>
</body>
</html>
